<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wedding Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f9f4ef;
      --blush: #e8d5c4;
      --rose: #b07d6a;
      --dark: #2c2420;
      --gold: #c9a96e;
    }

    body {
      background-color: var(--cream);
      color: var(--dark);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    header {
      text-align: center;
      padding: 80px 20px 50px;
      position: relative;
      z-index: 1;
    }

    .header-line {
      width: 60px;
      height: 1px;
      background: var(--gold);
      display: inline-block;
      vertical-align: middle;
      margin: 0 16px;
    }

    .header-ornament {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: var(--rose);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--dark);
      margin-bottom: 20px;
    }

    h1 em {
      font-style: italic;
      color: var(--rose);
    }

    .subtitle {
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--rose);
      opacity: 0.8;
    }

    /* Decorative divider */
    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 40px auto 60px;
      max-width: 300px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--blush), var(--gold));
    }
    .divider::after {
      background: linear-gradient(to left, transparent, var(--blush), var(--gold));
    }
    .divider-diamond {
      width: 6px; height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
    }

    /* Gallery grid */
    .gallery {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 100px;
      columns: 3;
      column-gap: 16px;
    }

    @media (max-width: 768px) { .gallery { columns: 2; } }
    @media (max-width: 480px) { .gallery { columns: 1; } }

    .photo-item {
      break-inside: avoid;
      margin-bottom: 16px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      border-radius: 2px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.7s ease forwards;
    }

    .photo-item:nth-child(1) { animation-delay: 0.1s; }
    .photo-item:nth-child(2) { animation-delay: 0.25s; }
    .photo-item:nth-child(3) { animation-delay: 0.4s; }
    .photo-item:nth-child(4) { animation-delay: 0.55s; }
    .photo-item:nth-child(5) { animation-delay: 0.7s; }
    .photo-item:nth-child(6) { animation-delay: 0.85s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .photo-item img {
      width: 100%;
      display: block;
      transition: transform 0.5s ease;
      background: var(--blush);
      min-height: 120px;
    }

    .photo-item:hover img { transform: scale(1.03); }

    .photo-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(44,36,32,0.35) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      align-items: flex-end;
      padding: 16px;
    }

    .photo-item:hover .photo-overlay { opacity: 1; }

    .expand-icon {
      color: white;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* Add more photos notice */
    .add-photos-tip {
      text-align: center;
      padding: 20px;
      position: relative;
      z-index: 1;
      margin-top: -60px;
      margin-bottom: 60px;
    }
    .add-photos-tip p {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--rose);
      opacity: 0.6;
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(20, 14, 12, 0.96);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .lightbox.open {
      display: flex;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .lightbox-img-wrap {
      max-width: 90vw;
      max-height: 90vh;
      position: relative;
    }

    .lightbox-img-wrap img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 2px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    }

    .lb-close {
      position: fixed;
      top: 24px; right: 28px;
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 8px 14px;
      border-radius: 2px;
      font-family: 'Jost', sans-serif;
      transition: all 0.2s;
    }
    .lb-close:hover { background: rgba(255,255,255,0.1); color: white; }

    .lb-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 16px 20px;
      border-radius: 2px;
      transition: all 0.2s;
      font-family: 'Jost', sans-serif;
    }
    .lb-nav:hover { background: rgba(255,255,255,0.08); color: white; }
    .lb-prev { left: 20px; }
    .lb-next { right: 20px; }

    .lb-counter {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--blush);
    }
    footer p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--rose);
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-ornament">
      <span class="header-line"></span>
      with love
      <span class="header-line"></span>
    </div>
    <h1>A Day to<br/><em>Remember</em></h1>
    <p class="subtitle">Wedding Celebration</p>
    <div class="divider"><div class="divider-diamond"></div></div>
  </header>

  <div class="gallery" id="gallery">
    <!-- Photos are injected here by JS -->
  </div>

  <div class="add-photos-tip">
    <p>✦ Add more photos by editing the photos array in this file ✦</p>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lb-close" onclick="closeLightbox()">✕ Close</button>
    <button class="lb-nav lb-prev" onclick="changePhoto(-1)">‹</button>
    <div class="lightbox-img-wrap">
      <img id="lb-img" src="" alt="Wedding photo"/>
    </div>
    <button class="lb-nav lb-next" onclick="changePhoto(1)">›</button>
    <div class="lb-counter" id="lb-counter"></div>
  </div>

  <footer>
    <p>"And they lived happily ever after."</p>
  </footer>

  <script>
    // =============================================
    // ADD YOUR GOOGLE DRIVE PHOTO IDs HERE
    // To add more photos:
    // 1. Right-click photo in Google Drive → Share → Copy link
    // 2. The link looks like: https://drive.google.com/file/d/FILE_ID/view
    // 3. Copy just the FILE_ID part and add it to this array
    // =============================================
    const photoIds = [
      "1MsFHwNGBSZ8w9gE-5Y0ur9F-23kQoiWx",
      "1hgdurg4EDUyvuYf4hihAQ4ZTR1st4Bvt",
      "1gVERjDd-utEEwRPaxNOQIy5fshJi_z2h",
      // Add more IDs below this line:
      // "YOUR_FILE_ID_HERE",
    ];

    const photos = photoIds.map(id => `https://drive.google.com/uc?export=view&id=${id}`);

    let currentIndex = 0;

    // Build gallery
    const gallery = document.getElementById('gallery');
    photos.forEach((src, i) => {
      const item = document.createElement('div');
      item.className = 'photo-item';
      item.innerHTML = `
        <img src="${src}" alt="Wedding photo ${i+1}" loading="lazy"/>
        <div class="photo-overlay">
          <span class="expand-icon">View</span>
        </div>
      `;
      item.addEventListener('click', () => openLightbox(i));
      gallery.appendChild(item);
    });

    function openLightbox(index) {
      currentIndex = index;
      document.getElementById('lb-img').src = photos[currentIndex];
      document.getElementById('lb-counter').textContent = `${currentIndex + 1} / ${photos.length}`;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function changePhoto(dir) {
      currentIndex = (currentIndex + dir + photos.length) % photos.length;
      const img = document.getElementById('lb-img');
      img.style.opacity = 0;
      img.src = photos[currentIndex];
      img.onload = () => { img.style.transition = 'opacity 0.3s'; img.style.opacity = 1; };
      document.getElementById('lb-counter').textContent = `${currentIndex + 1} / ${photos.length}`;
    }

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'ArrowRight') changePhoto(1);
      if (e.key === 'ArrowLeft') changePhoto(-1);
      if (e.key === 'Escape') closeLightbox();
    });

    // Close on background click
    document.getElementById('lightbox').addEventListener('click', e => {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    });
  </script>
</body>
</html>
